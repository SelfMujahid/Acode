<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Project Editor</title>

<style>
:root{
  --bg:#0f172a;
  --bg2:#111827;
  --panel:#111827;
  --panel2:#0b1220;
  --card:rgba(17,24,39,.96);
  --line:rgba(255,255,255,.08);
  --text:#e5e7eb;
  --muted:#94a3b8;
  --accent:#00c2ff;
  --accent2:#4f46e5;
  --good:#00c853;
  --danger:#f6465d;
  --warn:#f59e0b;
  --shadow:0 18px 40px rgba(0,0,0,.28);
  --radius:18px;
  --radius-sm:12px;
  --transition:.22s ease;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,
body{
  height:100%;
}

body{
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at top left, rgba(0,194,255,.10), transparent 28%),
    radial-gradient(circle at top right, rgba(79,70,229,.12), transparent 25%),
    linear-gradient(180deg, #09111f 0%, #0b1220 100%);
  color:var(--text);
  overflow:hidden;
}

button,
input,
textarea{
  font:inherit;
}

#backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  opacity:0;
  pointer-events:none;
  transition:opacity var(--transition);
  z-index:20;
}

body.sidebar-open #backdrop{
  opacity:1;
  pointer-events:auto;
}

#sidebar{
  position:fixed;
  top:0;
  left:0;
  bottom:0;
  width:min(340px,88vw);
  background:rgba(15,23,42,.96);
  backdrop-filter:blur(18px);
  border-right:1px solid var(--line);
  transform:translateX(-102%);
  transition:transform var(--transition);
  z-index:30;
  display:flex;
  flex-direction:column;
  box-shadow:var(--shadow);
}

body.sidebar-open #sidebar{
  transform:translateX(0);
}

#sidebar-header{
  padding:14px;
  border-bottom:1px solid var(--line);
}

#sidebar-title{
  font-weight:800;
  font-size:15px;
  letter-spacing:.3px;
  margin-bottom:10px;
}

#sidebar-sub{
  font-size:12px;
  color:var(--muted);
  margin-bottom:12px;
}

#tree{
  flex:1;
  overflow:auto;
  padding:10px 10px 18px;
}

#tree::-webkit-scrollbar,
#dialog-root::-webkit-scrollbar{
  width:8px;
  height:8px;
}

#tree::-webkit-scrollbar-thumb,
#dialog-root::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,.18);
  border-radius:999px;
}

#tree::-webkit-scrollbar-track,
#dialog-root::-webkit-scrollbar-track{
  background:transparent;
}

.folder-node,
.file-node{
  margin-bottom:4px;
}

.node-row{
  display:flex;
  align-items:center;
  gap:8px;
  padding:9px 10px;
  border-radius:12px;
  transition:background var(--transition), transform var(--transition);
  user-select:none;
}

.node-row:hover{
  background:rgba(255,255,255,.05);
}

.node-row.active{
  background:rgba(0,194,255,.10);
  outline:1px solid rgba(0,194,255,.18);
}

.node-left{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
  flex:1;
}

.twisty{
  width:16px;
  text-align:center;
  color:var(--muted);
  font-size:12px;
  flex:0 0 auto;
}

.node-icon{
  width:18px;
  text-align:center;
  flex:0 0 auto;
  color:#67e8f9;
}

.node-name{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  font-size:13px;
  font-weight:600;
}

.node-actions{
  display:flex;
  gap:5px;
  flex:0 0 auto;
}

.node-btn{
  border:none;
  cursor:pointer;
  width:30px;
  height:30px;
  border-radius:10px;
  background:rgba(255,255,255,.06);
  color:var(--text);
  transition:transform var(--transition), background var(--transition), border-color var(--transition);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  border:1px solid rgba(255,255,255,.07);
}

.node-btn:hover{
  background:rgba(0,194,255,.12);
  border-color:rgba(0,194,255,.22);
  transform:translateY(-1px);
}

.node-children{
  margin-left:18px;
  padding-left:10px;
  border-left:1px dashed rgba(255,255,255,.10);
}

.file-meta{
  color:var(--muted);
  font-size:11px;
  margin-top:6px;
  padding-left:6px;
}

#app{
  height:100vh;
  display:flex;
  flex-direction:column;
}

#topbar{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  border-bottom:1px solid var(--line);
  background:rgba(9,17,31,.78);
  backdrop-filter:blur(18px);
}

.icon-btn{
  width:42px;
  height:42px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.06);
  color:var(--text);
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  transition:transform var(--transition), background var(--transition), border-color var(--transition);
}

.icon-btn:hover{
  background:rgba(255,255,255,.10);
  border-color:rgba(255,255,255,.12);
  transform:translateY(-1px);
}

#project-name{
  font-weight:800;
  font-size:15px;
  letter-spacing:.2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:34vw;
}

#current-file{
  margin-left:auto;
  color:var(--muted);
  font-size:12px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:42vw;
}

#workspace{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
}

#editor-pane{
  height:30%;
  min-height:180px;
  display:flex;
  flex-direction:column;
  border-bottom:1px solid var(--line);
  background:rgba(255,255,255,.02);
}

#editor{
  flex:1;
  width:100%;
  border:none;
  outline:none;
  resize:none;
  padding:14px;
  background:#0b1220;
  color:#6ee7b7;
  font-size:14px;
  line-height:1.55;
  font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
}

#image-preview-wrap{
  flex:1;
  display:none;
  align-items:center;
  justify-content:center;
  padding:12px;
  background:#0b1220;
  overflow:auto;
}

#image-preview{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

#preview{
  flex:1;
  width:100%;
  border:none;
  background:#fff;
}

#status{
  height:28px;
  padding:0 12px;
  display:flex;
  align-items:center;
  border-top:1px solid var(--line);
  background:rgba(9,17,31,.84);
  color:var(--muted);
  font-size:12px;
}

input[type="file"]{
  display:none;
}

/* Dialog */
#dialog-root{
  position:fixed;
  inset:0;
  z-index:100;
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  background:rgba(0,0,0,.52);
  backdrop-filter:blur(6px);
  overflow:auto;
}

#dialog-root.open{
  display:flex;
}

.dialog-card{
  width:min(100%, 460px);
  background:linear-gradient(180deg, rgba(15,23,42,.98), rgba(9,17,31,.98));
  color:var(--text);
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;
  box-shadow:0 30px 80px rgba(0,0,0,.4);
  padding:18px;
}

.dialog-title{
  font-size:18px;
  font-weight:800;
  margin-bottom:8px;
}

.dialog-message{
  font-size:13px;
  color:var(--muted);
  margin-bottom:14px;
  line-height:1.5;
}

.dialog-input{
  width:100%;
  border-radius:14px;
  border:1px solid rgba(148,163,184,.22);
  background:#0b1220;
  color:var(--text);
  padding:12px 14px;
  outline:none;
}

.dialog-input:focus{
  border-color:rgba(0,194,255,.7);
  box-shadow:0 0 0 4px rgba(0,194,255,.12);
}

.dialog-textarea{
  width:100%;
  min-height:120px;
  resize:vertical;
}

.dialog-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:16px;
}

.dialog-btn{
  border:none;
  border-radius:12px;
  padding:11px 16px;
  cursor:pointer;
  font-weight:700;
  transition:transform var(--transition), filter var(--transition), background var(--transition);
}

.dialog-btn:hover{
  transform:translateY(-1px);
}

.dialog-btn.secondary{
  background:#253247;
  color:#e5e7eb;
}

.dialog-btn.primary{
  background:linear-gradient(135deg, var(--accent), var(--accent2));
  color:white;
}

.dialog-btn.danger{
  background:linear-gradient(135deg, var(--danger), #ff7b8d);
  color:white;
}

.dialog-list{
  display:flex;
  flex-direction:column;
  gap:8px;
  max-height:300px;
  overflow:auto;
  padding-right:4px;
}

.dialog-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  padding:11px 12px;
  border-radius:14px;
  background:#0b1220;
  border:1px solid rgba(255,255,255,.08);
  cursor:pointer;
}

.dialog-item:hover{
  background:#101a2d;
}

.dialog-item strong{
  font-size:14px;
}

.dialog-item span{
  font-size:12px;
  color:var(--muted);
}

/* Small screens */
@media (max-width: 900px){
  #project-name{
    max-width:28vw;
  }

  #current-file{
    max-width:34vw;
  }

  #editor-pane{
    min-height:170px;
  }
}
</style>
</head>
<body>
<div id="backdrop"></div>

<aside id="sidebar">
  <div id="sidebar-header">
    <div id="sidebar-title">Project Files</div>
    <div id="sidebar-sub">Click a file to open it. Use folder icons to create items inside that folder.</div>
  </div>
  <div id="tree"></div>
</aside>

<div id="dialog-root"></div>

<div id="app">
  <div id="topbar">
    <button class="icon-btn" id="menuBtn" title="Open sidebar">☰</button>
    <button class="icon-btn" id="newProjectBtn" title="New project">＋</button>
    <div id="project-name"></div>
    <div id="current-file">No file selected</div>
  </div>

  <div id="workspace">
    <div id="editor-pane">
      <textarea id="editor" spellcheck="false"></textarea>
      <div id="image-preview-wrap">
        <img id="image-preview" alt="preview" />
      </div>
    </div>
    <iframe id="preview"></iframe>
    <div id="status">Ready</div>
  </div>
</div>

<input id="fileInput" type="file" multiple />

<script>
const STORAGE_KEY = "liveProjectWorkspaceV5";

const backdrop = document.getElementById("backdrop");
const sidebar = document.getElementById("sidebar");
const tree = document.getElementById("tree");
const dialogRoot = document.getElementById("dialog-root");
const menuBtn = document.getElementById("menuBtn");
const newProjectBtn = document.getElementById("newProjectBtn");
const projectNameEl = document.getElementById("project-name");
const currentFileEl = document.getElementById("current-file");
const editor = document.getElementById("editor");
const preview = document.getElementById("preview");
const statusEl = document.getElementById("status");
const fileInput = document.getElementById("fileInput");
const imagePreviewWrap = document.getElementById("image-preview-wrap");
const imagePreview = document.getElementById("image-preview");

let project = loadProject();
let currentFile = project.currentFile || `${project.root}/index.html`;
let expandedFolders = new Set(project.expandedFolders || [project.root]);
let activePreviewFiles = project.activePreviewFiles || {
  html: `${project.root}/index.html`,
  css: `${project.root}/style.css`,
  js: `${project.root}/app.js`
};

function createDefaultProject(rootName) {
  const root = normalizePath(rootName) || "MyProject";
  const folders = [root];
  const files = {};
  files[`${root}/index.html`] = `<h1>Hello</h1>
<p>Live project editor</p>
<img src="assets/logo.png" alt="logo" style="max-width:220px;display:block;margin-top:12px;">`;
  files[`${root}/style.css`] = `body{
  background:#111;
  color:lime;
  font-family:sans-serif;
  padding:20px;
}`;
  files[`${root}/app.js`] = `console.log("Hello");`;

  return {
    root,
    folders,
    files,
    currentFile: `${root}/index.html`,
    expandedFolders: [root],
    activePreviewFiles: {
      html: `${root}/index.html`,
      css: `${root}/style.css`,
      js: `${root}/app.js`
    }
  };
}

function loadProject() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return createDefaultProject("MyProject");
    const parsed = JSON.parse(raw);
    return normalizeProject(parsed);
  } catch (e) {
    return createDefaultProject("MyProject");
  }
}

function normalizeProject(data) {
  const fallback = createDefaultProject("MyProject");

  const root = normalizePath(data?.root || fallback.root) || fallback.root;
  const folders = Array.isArray(data?.folders) ? data.folders.map(normalizePath).filter(Boolean) : fallback.folders.slice();
  const files = data?.files && typeof data.files === "object" ? data.files : fallback.files;

  folders.unshift(root);
  const uniqueFolders = [...new Set(folders)];

  const normalizedFiles = {};
  for (const [key, value] of Object.entries(files)) {
    const p = normalizePath(key);
    if (p) normalizedFiles[p] = value;
  }

  const current = normalizePath(data?.currentFile || fallback.currentFile) || `${root}/index.html`;
  const expanded = Array.isArray(data?.expandedFolders) ? data.expandedFolders.map(normalizePath).filter(Boolean) : [root];
  const previewFiles = data?.activePreviewFiles && typeof data.activePreviewFiles === "object"
    ? {
        html: normalizePath(data.activePreviewFiles.html || `${root}/index.html`),
        css: normalizePath(data.activePreviewFiles.css || `${root}/style.css`),
        js: normalizePath(data.activePreviewFiles.js || `${root}/app.js`)
      }
    : {
        html: `${root}/index.html`,
        css: `${root}/style.css`,
        js: `${root}/app.js`
      };

  return {
    root,
    folders: uniqueFolders,
    files: normalizedFiles,
    currentFile: current,
    expandedFolders: [...new Set(expanded)],
    activePreviewFiles: previewFiles
  };
}

function saveProject() {
  project.currentFile = currentFile;
  project.expandedFolders = [...expandedFolders];
  project.activePreviewFiles = activePreviewFiles;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(project));
  projectNameEl.textContent = project.root;
}

function setStatus(msg) {
  statusEl.textContent = msg;
}

function normalizePath(path) {
  return String(path || "")
    .replace(/\\/g, "/")
    .replace(/^\/+/, "")
    .replace(/\/+/g, "/")
    .replace(/\/+$/, "")
    .trim();
}

function parentPath(path) {
  path = normalizePath(path);
  if (!path) return "";
  const idx = path.lastIndexOf("/");
  return idx === -1 ? "" : path.slice(0, idx);
}

function baseName(path) {
  path = normalizePath(path);
  if (!path) return "";
  const idx = path.lastIndexOf("/");
  return idx === -1 ? path : path.slice(idx + 1);
}

function extOf(path) {
  const name = baseName(path);
  const idx = name.lastIndexOf(".");
  return idx === -1 ? "" : name.slice(idx + 1).toLowerCase();
}

function isImageFile(path) {
  return ["png","jpg","jpeg","gif","webp","bmp","svg","avif"].includes(extOf(path));
}

function isTextFile(path) {
  return !isImageFile(path);
}

function joinPath(base, name) {
  const a = normalizePath(base);
  const b = normalizePath(name);
  return normalizePath(a ? `${a}/${b}` : b);
}

function uniqueFilePath(path) {
  path = normalizePath(path);
  if (!path) return path;

  if (!project.files[path] && !project.folders.includes(path)) return path;

  const lastDot = path.lastIndexOf(".");
  const lastSlash = path.lastIndexOf("/");
  const hasExt = lastDot > lastSlash;

  const base = hasExt ? path.slice(0, lastDot) : path;
  const ext = hasExt ? path.slice(lastDot) : "";

  let i = 1;
  let candidate = path;
  while (project.files[candidate] || project.folders.includes(candidate)) {
    candidate = `${base} (${i})${ext}`;
    i++;
  }
  return candidate;
}

function ensureFolder(folderPath) {
  folderPath = normalizePath(folderPath);
  if (!folderPath) return;

  const parts = folderPath.split("/");
  let acc = "";
  for (const part of parts) {
    acc = acc ? `${acc}/${part}` : part;
    if (!project.folders.includes(acc)) project.folders.push(acc);
  }

  expandedFolders.add(folderPath);
  saveProject();
}

function createFile(filePath, content = "") {
  filePath = normalizePath(filePath);
  if (!filePath) return false;

  const dir = parentPath(filePath);
  if (dir) ensureFolder(dir);

  const finalPath = uniqueFilePath(filePath);
  project.files[finalPath] = content;
  saveProject();
  return finalPath;
}

function deleteFileOrFolder(path) {
  path = normalizePath(path);
  if (!path) return;

  if (path === project.root) {
    for (const key of Object.keys(project.files)) delete project.files[key];
    project.folders = [project.root];
    expandedFolders = new Set([project.root]);
    activePreviewFiles = {
      html: `${project.root}/index.html`,
      css: `${project.root}/style.css`,
      js: `${project.root}/app.js`
    };
    project.files[`${project.root}/index.html`] = `<h1>New Project</h1>`;
    project.files[`${project.root}/style.css`] = `body{font-family:sans-serif;padding:20px;}`;
    project.files[`${project.root}/app.js`] = `console.log("New project");`;
    currentFile = `${project.root}/index.html`;
    saveProject();
    renderAll();
    openFile(currentFile);
    setStatus("Project reset");
    return;
  }

  const isFolder = project.folders.includes(path);

  if (isFolder) {
    const prefix = `${path}/`;
    for (const f of Object.keys(project.files)) {
      if (f === path || f.startsWith(prefix)) delete project.files[f];
    }
    project.folders = project.folders.filter(f => f !== path && !f.startsWith(prefix));
    expandedFolders = new Set([...expandedFolders].filter(f => f !== path && !f.startsWith(prefix)));

    if (currentFile === path || currentFile.startsWith(prefix)) currentFile = `${project.root}/index.html`;
    if (activePreviewFiles.html === path || activePreviewFiles.html.startsWith(prefix)) activePreviewFiles.html = `${project.root}/index.html`;
    if (activePreviewFiles.css === path || activePreviewFiles.css.startsWith(prefix)) activePreviewFiles.css = `${project.root}/style.css`;
    if (activePreviewFiles.js === path || activePreviewFiles.js.startsWith(prefix)) activePreviewFiles.js = `${project.root}/app.js`;

    if (!project.files[currentFile]) currentFile = Object.keys(project.files)[0] || "";
    saveProject();
    renderAll();
    if (currentFile) openFile(currentFile);
    setStatus("Folder deleted");
    return;
  }

  delete project.files[path];

  if (currentFile === path) currentFile = `${project.root}/index.html`;
  if (activePreviewFiles.html === path) activePreviewFiles.html = `${project.root}/index.html`;
  if (activePreviewFiles.css === path) activePreviewFiles.css = `${project.root}/style.css`;
  if (activePreviewFiles.js === path) activePreviewFiles.js = `${project.root}/app.js`;

  if (!project.files[currentFile]) currentFile = Object.keys(project.files)[0] || "";

  saveProject();
  renderAll();
  if (currentFile) openFile(currentFile);
  setStatus("Deleted");
}

function renamePath(oldPath, newPath) {
  oldPath = normalizePath(oldPath);
  newPath = normalizePath(newPath);
  if (!oldPath || !newPath || oldPath === newPath) return;

  if (project.files[oldPath] !== undefined) {
    const target = uniqueFilePath(newPath);
    const content = project.files[oldPath];
    delete project.files[oldPath];
    project.files[target] = content;

    if (currentFile === oldPath) currentFile = target;
    if (activePreviewFiles.html === oldPath) activePreviewFiles.html = target;
    if (activePreviewFiles.css === oldPath) activePreviewFiles.css = target;
    if (activePreviewFiles.js === oldPath) activePreviewFiles.js = target;

    saveProject();
    renderAll();
    openFile(target);
    setStatus("File renamed");
    return;
  }

  if (project.folders.includes(oldPath)) {
    const target = normalizePath(newPath);
    const oldPrefix = `${oldPath}/`;
    const newPrefix = `${target}/`;

    project.folders = project.folders.map(f => {
      if (f === oldPath) return target;
      if (f.startsWith(oldPrefix)) return `${newPrefix}${f.slice(oldPrefix.length)}`;
      return f;
    });

    const movedFiles = {};
    for (const [key, value] of Object.entries(project.files)) {
      if (key.startsWith(oldPrefix)) {
        movedFiles[`${newPrefix}${key.slice(oldPrefix.length)}`] = value;
      } else if (key === oldPath) {
        movedFiles[target] = value;
      } else {
        movedFiles[key] = value;
      }
    }
    project.files = movedFiles;

    expandedFolders = new Set([...expandedFolders].map(f => {
      if (f === oldPath) return target;
      if (f.startsWith(oldPrefix)) return `${newPrefix}${f.slice(oldPrefix.length)}`;
      return f;
    }));

    if (currentFile === oldPath || currentFile.startsWith(oldPrefix)) {
      currentFile = `${newPrefix}${currentFile.slice(oldPrefix.length)}`;
    }

    if (activePreviewFiles.html === oldPath || activePreviewFiles.html.startsWith(oldPrefix)) {
      activePreviewFiles.html = `${newPrefix}${activePreviewFiles.html.slice(oldPrefix.length)}`;
    }
    if (activePreviewFiles.css === oldPath || activePreviewFiles.css.startsWith(oldPrefix)) {
      activePreviewFiles.css = `${newPrefix}${activePreviewFiles.css.slice(oldPrefix.length)}`;
    }
    if (activePreviewFiles.js === oldPath || activePreviewFiles.js.startsWith(oldPrefix)) {
      activePreviewFiles.js = `${newPrefix}${activePreviewFiles.js.slice(oldPrefix.length)}`;
    }

    project.root = project.root === oldPath ? target : project.root;
    if (!currentFile || !project.files[currentFile]) currentFile = `${project.root}/index.html`;

    saveProject();
    renderAll();
    if (project.files[currentFile]) openFile(currentFile);
    setStatus("Folder renamed");
  }
}

function childrenFolders(folderPath) {
  folderPath = normalizePath(folderPath);
  return [...new Set(project.folders)]
    .filter(f => f !== folderPath && parentPath(f) === folderPath)
    .sort((a, b) => baseName(a).localeCompare(baseName(b)));
}

function childrenFiles(folderPath) {
  folderPath = normalizePath(folderPath);
  return Object.keys(project.files)
    .filter(f => parentPath(f) === folderPath)
    .sort((a, b) => baseName(a).localeCompare(baseName(b)));
}

function setSidebarOpen(open) {
  document.body.classList.toggle("sidebar-open", open);
}

function closeSidebar() {
  setSidebarOpen(false);
}

function toggleSidebar() {
  setSidebarOpen(!document.body.classList.contains("sidebar-open"));
}

function openFile(path) {
  path = normalizePath(path);
  if (!(path in project.files)) return;

  currentFile = path;
  currentFileEl.textContent = path;

  const ext = extOf(path);
  if (["html","htm"].includes(ext)) activePreviewFiles.html = path;
  if (ext === "css") activePreviewFiles.css = path;
  if (ext === "js") activePreviewFiles.js = path;

  if (isImageFile(path)) {
    editor.style.display = "none";
    imagePreviewWrap.style.display = "flex";
    imagePreview.src = project.files[path];
  } else {
    imagePreviewWrap.style.display = "none";
    editor.style.display = "block";
    editor.value = project.files[path] ?? "";
  }

  saveProject();
  refreshTree();
  refreshPreview();

  if (window.innerWidth < 900) closeSidebar();
}

function currentActiveClass(path, isFolder = false) {
  if (!currentFile) return "";
  if (isFolder) {
    return currentFile === path || currentFile.startsWith(`${path}/`) ? "active" : "";
  }
  return currentFile === path ? "active" : "";
}

function makeNodeButton(symbol, title, handler, colorClass = "") {
  const btn = document.createElement("button");
  btn.className = `node-btn ${colorClass}`.trim();
  btn.type = "button";
  btn.title = title;
  btn.textContent = symbol;
  btn.addEventListener("click", (e) => {
    e.stopPropagation();
    handler(e);
  });
  return btn;
}

function renderFolderNode(folderPath, isRoot = false) {
  const wrap = document.createElement("div");
  wrap.className = "folder-node";

  const row = document.createElement("div");
  row.className = `node-row ${currentActiveClass(folderPath, true)}`.trim();

  const left = document.createElement("div");
  left.className = "node-left";

  const twisty = document.createElement("span");
  twisty.className = "twisty";
  const open = expandedFolders.has(folderPath) || isRoot;
  twisty.textContent = open ? "▾" : "▸";

  const icon = document.createElement("span");
  icon.className = "node-icon";
  icon.textContent = "📁";

  const name = document.createElement("div");
  name.className = "node-name";
  name.textContent = isRoot ? project.root : baseName(folderPath);

  left.appendChild(twisty);
  left.appendChild(icon);
  left.appendChild(name);

  const actions = document.createElement("div");
  actions.className = "node-actions";

  actions.appendChild(makeNodeButton("＋F", "New folder", () => createFolderIn(folderPath)));
  actions.appendChild(makeNodeButton("＋", "New file", () => createFileIn(folderPath)));
  actions.appendChild(makeNodeButton("⤴", "Import file", () => importFilesTo(folderPath)));
  actions.appendChild(makeNodeButton("✎", "Rename", () => renameNode(folderPath)));
  actions.appendChild(makeNodeButton("🗑", "Delete", () => deleteNode(folderPath), "danger"));

  row.appendChild(left);
  row.appendChild(actions);

  row.addEventListener("click", () => {
    if (expandedFolders.has(folderPath)) expandedFolders.delete(folderPath);
    else expandedFolders.add(folderPath);
    saveProject();
    refreshTree();
  });

  wrap.appendChild(row);

  if (open) {
    const children = document.createElement("div");
    children.className = "node-children";

    for (const childFolder of childrenFolders(folderPath)) {
      children.appendChild(renderFolderNode(childFolder, false));
    }

    for (const filePath of childrenFiles(folderPath)) {
      children.appendChild(renderFileNode(filePath));
    }

    wrap.appendChild(children);
  }

  return wrap;
}

function renderFileNode(filePath) {
  const wrap = document.createElement("div");
  wrap.className = "file-node";

  const row = document.createElement("div");
  row.className = `node-row ${currentActiveClass(filePath, false)}`.trim();

  const left = document.createElement("div");
  left.className = "node-left";

  const twisty = document.createElement("span");
  twisty.className = "twisty";
  twisty.textContent = " ";

  const icon = document.createElement("span");
  icon.className = "node-icon";
  icon.textContent = isImageFile(filePath) ? "🖼" : "📄";

  const name = document.createElement("div");
  name.className = "node-name";
  name.textContent = baseName(filePath);

  left.appendChild(twisty);
  left.appendChild(icon);
  left.appendChild(name);

  const actions = document.createElement("div");
  actions.className = "node-actions";
  actions.appendChild(makeNodeButton("✎", "Rename", () => renameNode(filePath)));
  actions.appendChild(makeNodeButton("🗑", "Delete", () => deleteNode(filePath), "danger"));

  row.appendChild(left);
  row.appendChild(actions);

  row.addEventListener("click", () => openFile(filePath));

  wrap.appendChild(row);
  return wrap;
}

function refreshTree() {
  tree.innerHTML = "";
  tree.appendChild(renderFolderNode(project.root, true));

  const hint = document.createElement("div");
  hint.className = "file-meta";
  hint.textContent = "Tip: folders can be nested. Use / in names or create items inside a folder.";
  tree.appendChild(hint);
}

async function createFolderIn(folderPath) {
  const name = await showInputDialog({
    title: "Create folder",
    message: `Folder will be created inside: ${folderPath}`,
    placeholder: "e.g. images or icons/ui",
    value: ""
  });

  if (!name) return;

  const full = uniquePath(joinPath(folderPath, name));
  ensureFolder(full);
  saveProject();
  refreshTree();
  setStatus(`Folder created: ${full}`);
}

async function createFileIn(folderPath) {
  const name = await showInputDialog({
    title: "Create file",
    message: `File will be created inside: ${folderPath}`,
    placeholder: "e.g. page.html or components/card.js",
    value: "new-file.html"
  });

  if (!name) return;

  const full = uniqueFilePath(joinPath(folderPath, name));
  const created = createFile(full, "");
  if (created) {
    saveProject();
    refreshTree();
    openFile(created);
    setStatus(`File created: ${created}`);
  }
}

async function renameNode(path) {
  path = normalizePath(path);
  const current = baseName(path);

  const newName = await showInputDialog({
    title: "Rename",
    message: "Enter the new name or path.",
    placeholder: path,
    value: current
  });

  if (!newName) return;

  const isFolder = project.folders.includes(path);
  const target = isFolder ? joinPath(parentPath(path), newName) : joinPath(parentPath(path), newName);
  renamePath(path, target);
}

async function deleteNode(path) {
  path = normalizePath(path);

  const sure = await showConfirmDialog({
    title: "Delete",
    message: `Are you sure you want to delete "${path}"? This cannot be undone.`,
    okText: "Delete",
    danger: true
  });

  if (!sure) return;
  deleteFileOrFolder(path);
}

function getAssetContentForSrc(src, htmlFilePath) {
  if (!src) return src;
  if (/^(https?:|data:|blob:|#|\/\/)/i.test(src)) return src;

  const resolved = resolveProjectPath(htmlFilePath, src);
  if (project.files[resolved] !== undefined) return project.files[resolved];

  const direct = normalizePath(src);
  if (project.files[direct] !== undefined) return project.files[direct];

  return src;
}

function resolveProjectPath(baseFilePath, relativePath) {
  const baseDir = parentPath(baseFilePath) || project.root;
  const combined = `${baseDir}/${relativePath}`.replace(/\\/g, "/");
  const parts = [];

  for (const part of combined.split("/")) {
    if (!part || part === ".") continue;
    if (part === "..") {
      if (parts.length) parts.pop();
      continue;
    }
    parts.push(part);
  }

  return parts.join("/");
}

function refreshPreview() {
  const htmlPath = activePreviewFiles.html || `${project.root}/index.html`;
  const cssPath = activePreviewFiles.css || `${project.root}/style.css`;
  const jsPath = activePreviewFiles.js || `${project.root}/app.js`;

  const htmlCode = project.files[htmlPath] || "";
  const cssCode = project.files[cssPath] || "";
  const jsCode = project.files[jsPath] || "";

  let processedHTML = htmlCode;

  try {
    const doc = new DOMParser().parseFromString(`<div id="root">${htmlCode}</div>`, "text/html");
    const root = doc.getElementById("root");
    if (root) {
      root.querySelectorAll("img,source,video,audio").forEach((el) => {
        const attr = el.tagName.toLowerCase() === "source" ? "src" : "src";
        const src = el.getAttribute(attr);
        if (src) el.setAttribute(attr, getAssetContentForSrc(src, htmlPath));
      });
      root.querySelectorAll("link").forEach((el) => {
        const href = el.getAttribute("href");
        if (href) {
          const resolved = resolveProjectPath(htmlPath, href);
          if (project.files[resolved] !== undefined && isTextFile(resolved)) {
            el.setAttribute("href", project.files[resolved]);
          }
        }
      });
      processedHTML = root.innerHTML;
    }
  } catch (e) {}

  preview.srcdoc = `<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>${cssCode}</style>
</head>
<body>
${processedHTML}
<script>
try {
${jsCode}
} catch (e) {
  document.body.insertAdjacentHTML("beforeend", "<pre style='color:red;white-space:pre-wrap;padding:12px;'>" + e + "</pre>");
}
<\/script>
</body>
</html>`;
}

function updateCurrentFileContent() {
  if (!currentFile || !(currentFile in project.files)) return;
  if (isImageFile(currentFile)) return;

  project.files[currentFile] = editor.value;

  const ext = extOf(currentFile);
  if (["html","htm"].includes(ext)) activePreviewFiles.html = currentFile;
  if (ext === "css") activePreviewFiles.css = currentFile;
  if (ext === "js") activePreviewFiles.js = currentFile;

  saveProject();
  refreshPreview();
  setStatus("Saved");
}

function newProject() {
  showInputDialog({
    title: "New project",
    message: "This will create a fresh repo-style project workspace.",
    placeholder: "Project name",
    value: "MyProject"
  }).then((name) => {
    if (!name) return;
    project = createDefaultProject(name);
    expandedFolders = new Set(project.expandedFolders);
    activePreviewFiles = { ...project.activePreviewFiles };
    currentFile = project.currentFile;
    saveProject();
    refreshTree();
    openFile(currentFile);
    setStatus(`Project created: ${project.root}`);
  });
}

function openDialogShell() {
  dialogRoot.innerHTML = "";
  dialogRoot.classList.add("open");
}

function closeDialog() {
  dialogRoot.classList.remove("open");
  dialogRoot.innerHTML = "";
}

function showInputDialog({ title, message, placeholder = "", value = "", okText = "OK" }) {
  return new Promise((resolve) => {
    openDialogShell();

    const card = document.createElement("div");
    card.className = "dialog-card";

    const h = document.createElement("div");
    h.className = "dialog-title";
    h.textContent = title;

    const p = document.createElement("div");
    p.className = "dialog-message";
    p.textContent = message;

    const input = document.createElement("input");
    input.className = "dialog-input";
    input.type = "text";
    input.placeholder = placeholder;
    input.value = value;

    const actions = document.createElement("div");
    actions.className = "dialog-actions";

    const cancel = document.createElement("button");
    cancel.className = "dialog-btn secondary";
    cancel.type = "button";
    cancel.textContent = "Cancel";

    const ok = document.createElement("button");
    ok.className = "dialog-btn primary";
    ok.type = "button";
    ok.textContent = okText;

    function finish(v) {
      closeDialog();
      resolve(v);
    }

    cancel.addEventListener("click", () => finish(null));
    ok.addEventListener("click", () => {
      const val = input.value.trim();
      finish(val || null);
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") ok.click();
      if (e.key === "Escape") cancel.click();
    });

    actions.appendChild(cancel);
    actions.appendChild(ok);
    card.appendChild(h);
    card.appendChild(p);
    card.appendChild(input);
    card.appendChild(actions);
    dialogRoot.appendChild(card);

    setTimeout(() => input.focus(), 0);
  });
}

function showConfirmDialog({ title, message, okText = "OK", danger = false }) {
  return new Promise((resolve) => {
    openDialogShell();

    const card = document.createElement("div");
    card.className = "dialog-card";

    const h = document.createElement("div");
    h.className = "dialog-title";
    h.textContent = title;

    const p = document.createElement("div");
    p.className = "dialog-message";
    p.textContent = message;

    const actions = document.createElement("div");
    actions.className = "dialog-actions";

    const cancel = document.createElement("button");
    cancel.className = "dialog-btn secondary";
    cancel.type = "button";
    cancel.textContent = "Cancel";

    const ok = document.createElement("button");
    ok.className = `dialog-btn ${danger ? "danger" : "primary"}`;
    ok.type = "button";
    ok.textContent = okText;

    const finish = (value) => {
      closeDialog();
      resolve(value);
    };

    cancel.addEventListener("click", () => finish(false));
    ok.addEventListener("click", () => finish(true));

    actions.appendChild(cancel);
    actions.appendChild(ok);
    card.appendChild(h);
    card.appendChild(p);
    card.appendChild(actions);
    dialogRoot.appendChild(card);
  });
}

async function importFilesTo(folderPath) {
  folderPath = normalizePath(folderPath);
  ensureFolder(folderPath);

  fileInput.value = "";
  fileInput.click();

  fileInput.onchange = async () => {
    const files = Array.from(fileInput.files || []);
    if (!files.length) return;

    let imported = 0;

    for (const file of files) {
      const safeName = file.name.replace(/\s+/g, "_");
      const path = uniqueFilePath(joinPath(folderPath, safeName));
      const content = await readFileSmart(file);
      project.files[path] = content;
      imported++;
    }

    saveProject();
    refreshTree();
    refreshPreview();
    setStatus(`${imported} file(s) imported into ${folderPath}`);
  };
}

function readFileSmart(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onload = () => resolve(reader.result);

    reader.onerror = () => reject(reader.error);

    const isTextLike =
      file.type.startsWith("text/") ||
      file.type === "application/json" ||
      /\.(txt|md|html|htm|css|js|json|xml|svg|csv|ts|tsx|jsx|scss|sass|less)$/i.test(file.name);

    if (file.type.startsWith("image/")) {
      reader.readAsDataURL(file);
    } else if (isTextLike) {
      reader.readAsText(file);
    } else {
      reader.readAsDataURL(file);
    }
  });
}

menuBtn.addEventListener("click", toggleSidebar);
backdrop.addEventListener("click", closeSidebar);
newProjectBtn.addEventListener("click", newProject);

editor.addEventListener("input", updateCurrentFileContent);
window.addEventListener("beforeunload", saveProject);
dialogRoot.addEventListener("click", (e) => {
  if (e.target === dialogRoot) closeDialog();
});

function renderAll() {
  projectNameEl.textContent = project.root;
  currentFileEl.textContent = currentFile || "No file selected";
  refreshTree();
  saveProject();
}

function openCurrentIfPossible() {
  if (!project.files[currentFile]) {
    currentFile = project.activePreviewFiles.html || `${project.root}/index.html`;
  }

  if (project.files[currentFile]) {
    openFile(currentFile);
  } else {
    editor.value = "";
    imagePreviewWrap.style.display = "none";
    editor.style.display = "block";
    currentFileEl.textContent = "No file selected";
    refreshPreview();
  }
}

function init() {
  project = normalizeProject(project);
  currentFile = project.currentFile || `${project.root}/index.html`;
  expandedFolders = new Set(project.expandedFolders || [project.root]);
  activePreviewFiles = project.activePreviewFiles || {
    html: `${project.root}/index.html`,
    css: `${project.root}/style.css`,
    js: `${project.root}/app.js`
  };

  renderAll();
  openCurrentIfPossible();
  setSidebarOpen(false);
  setStatus("Ready");
}

init();
</script>
