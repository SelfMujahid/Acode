<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Project Editor</title>

<style>
:root{
  --bg:#0f172a;
  --bg2:#111827;
  --card:rgba(17,24,39,.96);
  --line:rgba(255,255,255,.08);
  --text:#e5e7eb;
  --muted:#94a3b8;
  --accent:#00c2ff;
  --accent2:#4f46e5;
  --good:#00c853;
  --danger:#f6465d;
  --shadow:0 18px 40px rgba(0,0,0,.28);
  --radius:18px;
  --transition:.22s ease;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,body{
  height:100%;
}

body{
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at top left, rgba(0,194,255,.10), transparent 28%),
    radial-gradient(circle at top right, rgba(79,70,229,.12), transparent 25%),
    linear-gradient(180deg, #09111f 0%, #0b1220 100%);
  color:var(--text);
  overflow:hidden;
}

button,input,textarea{
  font:inherit;
}

#backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  opacity:0;
  pointer-events:none;
  transition:opacity var(--transition);
  z-index:20;
}

body.sidebar-open #backdrop{
  opacity:1;
  pointer-events:auto;
}

#sidebar{
  position:fixed;
  top:0;
  left:0;
  bottom:0;
  width:min(340px,88vw);
  background:rgba(15,23,42,.96);
  backdrop-filter:blur(18px);
  border-right:1px solid var(--line);
  transform:translateX(-102%);
  transition:transform var(--transition);
  z-index:30;
  display:flex;
  flex-direction:column;
  box-shadow:var(--shadow);
}

body.sidebar-open #sidebar{
  transform:translateX(0);
}

#sidebar-header{
  padding:14px;
  border-bottom:1px solid var(--line);
}

#sidebar-title{
  font-weight:800;
  font-size:15px;
  letter-spacing:.3px;
  margin-bottom:10px;
}

#project-list{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.project-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:10px 12px;
  border-radius:12px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.06);
  cursor:pointer;
}

.project-item.active{
  background:rgba(0,194,255,.12);
  border-color:rgba(0,194,255,.18);
}

.project-item strong{
  font-size:13px;
}

.project-item span{
  font-size:11px;
  color:var(--muted);
}

#tree{
  flex:1;
  overflow:auto;
  padding:10px 10px 18px;
}

#tree::-webkit-scrollbar,
#dialog-root::-webkit-scrollbar{
  width:8px;
  height:8px;
}

#tree::-webkit-scrollbar-thumb,
#dialog-root::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,.18);
  border-radius:999px;
}

#tree::-webkit-scrollbar-track,
#dialog-root::-webkit-scrollbar-track{
  background:transparent;
}

.folder-node,
.file-node{
  margin-bottom:4px;
}

.node-row{
  display:flex;
  align-items:center;
  gap:8px;
  padding:9px 10px;
  border-radius:12px;
  transition:background var(--transition), transform var(--transition);
  user-select:none;
}

.node-row:hover{
  background:rgba(255,255,255,.05);
}

.node-row.active{
  background:rgba(0,194,255,.10);
  outline:1px solid rgba(0,194,255,.18);
}

.node-left{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
  flex:1;
}

.twisty{
  width:16px;
  text-align:center;
  color:var(--muted);
  font-size:12px;
  flex:0 0 auto;
}

.node-icon{
  width:18px;
  text-align:center;
  flex:0 0 auto;
}

.file-badge{
  min-width:42px;
  padding:2px 7px;
  border-radius:999px;
  font-size:10px;
  font-weight:800;
  text-align:center;
  color:#061018;
  background:#cbd5e1;
}

.badge-html{ background:#ffd166; }
.badge-css{ background:#67e8f9; }
.badge-js{ background:#facc15; }
.badge-img{ background:#86efac; }
.badge-txt{ background:#cbd5e1; }

.node-name{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  font-size:13px;
  font-weight:600;
}

.node-actions{
  display:flex;
  gap:5px;
  flex:0 0 auto;
}

.node-btn{
  border:none;
  cursor:pointer;
  width:30px;
  height:30px;
  border-radius:10px;
  background:rgba(255,255,255,.06);
  color:var(--text);
  transition:transform var(--transition), background var(--transition), border-color var(--transition);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  border:1px solid rgba(255,255,255,.07);
}

.node-btn:hover{
  background:rgba(0,194,255,.12);
  border-color:rgba(0,194,255,.22);
  transform:translateY(-1px);
}

.node-btn.danger:hover{
  background:rgba(246,70,93,.16);
  border-color:rgba(246,70,93,.25);
}

.node-children{
  margin-left:18px;
  padding-left:10px;
  border-left:1px dashed rgba(255,255,255,.10);
}

#app{
  height:100vh;
  display:flex;
  flex-direction:column;
}

#topbar{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  border-bottom:1px solid var(--line);
  background:rgba(9,17,31,.78);
  backdrop-filter:blur(18px);
}

.icon-btn{
  width:42px;
  height:42px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.06);
  color:var(--text);
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  transition:transform var(--transition), background var(--transition), border-color var(--transition);
}

.icon-btn:hover{
  background:rgba(255,255,255,.10);
  border-color:rgba(255,255,255,.12);
  transform:translateY(-1px);
}

#project-name{
  font-weight:800;
  font-size:15px;
  letter-spacing:.2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:34vw;
}

#current-file{
  margin-left:auto;
  color:var(--muted);
  font-size:12px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:42vw;
}

#workspace{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
}

#editor-pane{
  height:30%;
  min-height:180px;
  display:flex;
  flex-direction:column;
  border-bottom:1px solid var(--line);
  background:rgba(255,255,255,.02);
}

#editor{
  flex:1;
  width:100%;
  border:none;
  outline:none;
  resize:none;
  padding:14px;
  background:#0b1220;
  color:#6ee7b7;
  font-size:14px;
  line-height:1.55;
  font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
}

#image-preview-wrap{
  flex:1;
  display:none;
  align-items:center;
  justify-content:center;
  padding:12px;
  background:#0b1220;
  overflow:auto;
}

#image-preview{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

#preview{
  flex:1;
  width:100%;
  border:none;
  background:#fff;
}

input[type="file"]{
  display:none;
}

#dialog-root{
  position:fixed;
  inset:0;
  z-index:100;
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  background:rgba(0,0,0,.52);
  backdrop-filter:blur(6px);
  overflow:auto;
}

#dialog-root.open{
  display:flex;
}

.dialog-card{
  width:min(100%, 460px);
  background:linear-gradient(180deg, rgba(15,23,42,.98), rgba(9,17,31,.98));
  color:var(--text);
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;
  box-shadow:0 30px 80px rgba(0,0,0,.4);
  padding:18px;
}

.dialog-title{
  font-size:18px;
  font-weight:800;
  margin-bottom:8px;
}

.dialog-message{
  font-size:13px;
  color:var(--muted);
  margin-bottom:14px;
  line-height:1.5;
}

.dialog-input{
  width:100%;
  border-radius:14px;
  border:1px solid rgba(148,163,184,.22);
  background:#0b1220;
  color:var(--text);
  padding:12px 14px;
  outline:none;
}

.dialog-input:focus{
  border-color:rgba(0,194,255,.7);
  box-shadow:0 0 0 4px rgba(0,194,255,.12);
}

.dialog-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:16px;
}

.dialog-btn{
  border:none;
  border-radius:12px;
  padding:11px 16px;
  cursor:pointer;
  font-weight:700;
  transition:transform var(--transition), filter var(--transition), background var(--transition);
}

.dialog-btn:hover{
  transform:translateY(-1px);
}

.dialog-btn.secondary{
  background:#253247;
  color:#e5e7eb;
}

.dialog-btn.primary{
  background:linear-gradient(135deg, var(--accent), var(--accent2));
  color:white;
}

.dialog-btn.danger{
  background:linear-gradient(135deg, var(--danger), #ff7b8d);
  color:white;
}

@media (max-width: 900px){
  #project-name{
    max-width:28vw;
  }

  #current-file{
    max-width:34vw;
  }

  #editor-pane{
    min-height:170px;
  }
}
</style>
</head>
<body>
<div id="backdrop"></div>

<aside id="sidebar">
  <div id="sidebar-header">
    <div id="sidebar-title">Projects</div>
    <div id="project-list"></div>
  </div>
  <div id="tree"></div>
</aside>

<div id="dialog-root"></div>

<div id="app">
  <div id="topbar">
    <button class="icon-btn" id="menuBtn" title="Open sidebar">☰</button>
    <button class="icon-btn" id="newProjectBtn" title="New project">＋</button>
    <div id="project-name"></div>
    <div id="current-file">No file selected</div>
  </div>

  <div id="workspace">
    <div id="editor-pane">
      <textarea id="editor" spellcheck="false"></textarea>
      <div id="image-preview-wrap">
        <img id="image-preview" alt="preview" />
      </div>
    </div>
    <iframe id="preview"></iframe>
  </div>
</div>

<input id="fileInput" type="file" multiple />

<script>
const STORAGE_KEY = "liveProjectWorkspaceV6";

const backdrop = document.getElementById("backdrop");
const sidebar = document.getElementById("sidebar");
const tree = document.getElementById("tree");
const projectList = document.getElementById("project-list");
const dialogRoot = document.getElementById("dialog-root");
const menuBtn = document.getElementById("menuBtn");
const newProjectBtn = document.getElementById("newProjectBtn");
const projectNameEl = document.getElementById("project-name");
const currentFileEl = document.getElementById("current-file");
const editor = document.getElementById("editor");
const preview = document.getElementById("preview");
const fileInput = document.getElementById("fileInput");
const imagePreviewWrap = document.getElementById("image-preview-wrap");
const imagePreview = document.getElementById("image-preview");

let appState = loadAppState();

function uid() {
  return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}

function normalizePath(path) {
  return String(path || "")
    .replace(/\\/g, "/")
    .replace(/^\/+/, "")
    .replace(/\/+/g, "/")
    .replace(/\/+$/, "")
    .trim();
}

function parentPath(path) {
  path = normalizePath(path);
  if (!path) return "";
  const idx = path.lastIndexOf("/");
  return idx === -1 ? "" : path.slice(0, idx);
}

function baseName(path) {
  path = normalizePath(path);
  if (!path) return "";
  const idx = path.lastIndexOf("/");
  return idx === -1 ? path : path.slice(idx + 1);
}

function extOf(path) {
  const name = baseName(path);
  const idx = name.lastIndexOf(".");
  return idx === -1 ? "" : name.slice(idx + 1).toLowerCase();
}

function isImageFile(path) {
  return ["png","jpg","jpeg","gif","webp","bmp","svg","avif"].includes(extOf(path));
}

function fileBadge(path) {
  if (isImageFile(path)) return "IMG";
  const ext = extOf(path);
  if (["html","htm"].includes(ext)) return "HTML";
  if (ext === "css") return "CSS";
  if (ext === "js") return "JS";
  if (ext) return ext.toUpperCase();
  return "FILE";
}

function badgeClass(path) {
  if (isImageFile(path)) return "badge-img";
  const ext = extOf(path);
  if (["html","htm"].includes(ext)) return "badge-html";
  if (ext === "css") return "badge-css";
  if (ext === "js") return "badge-js";
  return "badge-txt";
}

function sanitizeProjectName(name) {
  const clean = String(name || "")
    .replace(/[\\/]+/g, "-")
    .replace(/\s+/g, " ")
    .trim();
  return clean || "MyProject";
}

function createDefaultProject(name) {
  const root = sanitizeProjectName(name);
  const files = {};
  files[`${root}/index.html`] = `<h1>Hello</h1>\n<p>Live project editor</p>\n<img src="assets/logo.png" alt="logo" style="max-width:220px;display:block;margin-top:12px;">`;
  files[`${root}/style.css`] = `body{\n  background:#111;\n  color:lime;\n  font-family:sans-serif;\n  padding:20px;\n}`;
  files[`${root}/app.js`] = `console.log("Hello");`;

  return normalizeProject({
    id: uid(),
    name: root,
    root,
    files,
    currentFile: `${root}/index.html`,
    expandedFolders: [root],
    activePreviewFiles: {
      html: `${root}/index.html`,
      css: `${root}/style.css`,
      js: `${root}/app.js`
    }
  });
}

function normalizeProject(p) {
  const root = sanitizeProjectName(p?.root || p?.name || "MyProject");
  const files = {};
  const incomingFiles = p?.files && typeof p.files === "object" ? p.files : {};

  for (const [k, v] of Object.entries(incomingFiles)) {
    const path = normalizePath(k);
    if (path) files[path] = v;
  }

  if (!files[`${root}/index.html`]) {
    files[`${root}/index.html`] = `<h1>Hello</h1>\n<p>Live project editor</p>\n<img src="assets/logo.png" alt="logo" style="max-width:220px;display:block;margin-top:12px;">`;
  }
  if (!files[`${root}/style.css`]) {
    files[`${root}/style.css`] = `body{\n  background:#111;\n  color:lime;\n  font-family:sans-serif;\n  padding:20px;\n}`;
  }
  if (!files[`${root}/app.js`]) {
    files[`${root}/app.js`] = `console.log("Hello");`;
  }

  const folders = new Set(Array.isArray(p?.folders) ? p.folders.map(normalizePath).filter(Boolean) : []);
  folders.add(root);

  for (const key of Object.keys(files)) {
    let dir = parentPath(key);
    while (dir) {
      folders.add(dir);
      dir = parentPath(dir);
    }
  }

  const expandedFolders = Array.isArray(p?.expandedFolders)
    ? p.expandedFolders.map(normalizePath).filter(Boolean)
    : [root];

  const currentFile = normalizePath(p?.currentFile || `${root}/index.html`) || `${root}/index.html`;

  const activePreviewFiles = p?.activePreviewFiles && typeof p.activePreviewFiles === "object"
    ? {
        html: normalizePath(p.activePreviewFiles.html || `${root}/index.html`) || `${root}/index.html`,
        css: normalizePath(p.activePreviewFiles.css || `${root}/style.css`) || `${root}/style.css`,
        js: normalizePath(p.activePreviewFiles.js || `${root}/app.js`) || `${root}/app.js`
      }
    : {
        html: `${root}/index.html`,
        css: `${root}/style.css`,
        js: `${root}/app.js`
      };

  return {
    id: p?.id || uid(),
    name: p?.name || root,
    root,
    folders: [...folders],
    files,
    currentFile,
    expandedFolders: [...new Set([...expandedFolders, root])],
    activePreviewFiles
  };
}

function defaultState() {
  const project = createDefaultProject("MyProject");
  return {
    activeProjectId: project.id,
    projects: [project]
  };
}

function loadAppState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    const projects = Array.isArray(parsed?.projects) ? parsed.projects.map(normalizeProject) : defaultState().projects;
    const activeProjectId = parsed?.activeProjectId || projects[0]?.id;
    return { projects, activeProjectId };
  } catch {
    return defaultState();
  }
}

function saveAppState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
  renderProjectList();
  renderSidebarTree();
  renderTopLabels();
}

function activeProject() {
  return appState.projects.find(p => p.id === appState.activeProjectId) || appState.projects[0];
}

function setActiveProject(id) {
  appState.activeProjectId = id;
  saveAppState();
  openCurrentFile();
  closeSidebar();
}

function createProject(name) {
  const project = createDefaultProject(name);
  appState.projects.push(project);
  appState.activeProjectId = project.id;
  saveAppState();
  openCurrentFile();
  closeSidebar();
}

function setSidebarOpen(open) {
  document.body.classList.toggle("sidebar-open", open);
}

function toggleSidebar() {
  setSidebarOpen(!document.body.classList.contains("sidebar-open"));
}

function closeSidebar() {
  setSidebarOpen(false);
}

function ensureFolderInProject(project, folderPath) {
  folderPath = normalizePath(folderPath);
  if (!folderPath) return;

  const parts = folderPath.split("/");
  let acc = "";
  for (const part of parts) {
    acc = acc ? `${acc}/${part}` : part;
    if (!project.folders.includes(acc)) project.folders.push(acc);
  }

  let parent = parentPath(folderPath);
  while (parent) {
    if (!project.folders.includes(parent)) project.folders.push(parent);
    parent = parentPath(parent);
  }

  if (!project.expandedFolders.includes(folderPath)) project.expandedFolders.push(folderPath);
}

function uniquePath(project, path) {
  path = normalizePath(path);
  if (!path) return path;
  if (!project.files[path] && !project.folders.includes(path)) return path;

  const lastDot = path.lastIndexOf(".");
  const lastSlash = path.lastIndexOf("/");
  const hasExt = lastDot > lastSlash;

  const base = hasExt ? path.slice(0, lastDot) : path;
  const ext = hasExt ? path.slice(lastDot) : "";

  let candidate = path;
  let i = 1;
  while (project.files[candidate] || project.folders.includes(candidate)) {
    candidate = `${base} (${i})${ext}`;
    i++;
  }
  return candidate;
}

function childrenFolders(project, folderPath) {
  folderPath = normalizePath(folderPath);
  return [...new Set(project.folders)]
    .filter(f => f !== folderPath && parentPath(f) === folderPath)
    .sort((a, b) => baseName(a).localeCompare(baseName(b)));
}

function childrenFiles(project, folderPath) {
  folderPath = normalizePath(folderPath);
  return Object.keys(project.files)
    .filter(f => parentPath(f) === folderPath)
    .sort((a, b) => baseName(a).localeCompare(baseName(b)));
}

function currentFileInside(folderPath, filePath) {
  folderPath = normalizePath(folderPath);
  filePath = normalizePath(filePath);
  return filePath === folderPath || filePath.startsWith(`${folderPath}/`);
}

function makeNodeButton(symbol, title, handler, extraClass = "") {
  const btn = document.createElement("button");
  btn.type = "button";
  btn.className = `node-btn ${extraClass}`.trim();
  btn.title = title;
  btn.textContent = symbol;
  btn.addEventListener("click", handler);
  return btn;
}

function openFile(path) {
  const project = activeProject();
  path = normalizePath(path);
  if (!(path in project.files)) return;

  project.currentFile = path;

  let dir = parentPath(path);
  while (dir) {
    if (!project.expandedFolders.includes(dir)) project.expandedFolders.push(dir);
    dir = parentPath(dir);
  }

  currentFileEl.textContent = path;

  const ext = extOf(path);
  if (["html","htm"].includes(ext)) project.activePreviewFiles.html = path;
  if (ext === "css") project.activePreviewFiles.css = path;
  if (ext === "js") project.activePreviewFiles.js = path;

  if (isImageFile(path)) {
    editor.style.display = "none";
    imagePreviewWrap.style.display = "flex";
    imagePreview.src = project.files[path];
  } else {
    imagePreviewWrap.style.display = "none";
    editor.style.display = "block";
    editor.value = project.files[path] ?? "";
  }

  saveAppState();
  renderSidebarTree();
  refreshPreview();

  if (window.innerWidth < 900) closeSidebar();
}

function openCurrentFile() {
  const project = activeProject();
  const current = project.currentFile && project.files[project.currentFile]
    ? project.currentFile
    : (project.activePreviewFiles?.html || `${project.root}/index.html`);

  if (project.files[current]) {
    openFile(current);
  } else {
    editor.value = "";
    currentFileEl.textContent = "No file selected";
    refreshPreview();
  }
}

function renderTopLabels() {
  const project = activeProject();
  projectNameEl.textContent = project.name || project.root;
  currentFileEl.textContent = project.currentFile || "No file selected";
}

function renderProjectList() {
  const current = activeProject();
  projectList.innerHTML = "";

  appState.projects.forEach((project) => {
    const item = document.createElement("div");
    item.className = `project-item ${project.id === current?.id ? "active" : ""}`.trim();

    const left = document.createElement("div");
    const strong = document.createElement("strong");
    strong.textContent = project.name || project.root;

    const small = document.createElement("span");
    small.textContent = project.root;

    left.appendChild(strong);
    left.appendChild(document.createElement("br"));
    left.appendChild(small);

    const right = document.createElement("span");
    right.textContent = project.id === current?.id ? "active" : "";

    item.appendChild(left);
    item.appendChild(right);

    item.addEventListener("click", () => setActiveProject(project.id));
    projectList.appendChild(item);
  });
}

function renderSidebarTree() {
  const project = activeProject();
  tree.innerHTML = "";
  tree.appendChild(renderFolderNode(project, project.root, true));
}

function renderFolderNode(project, folderPath, isRoot = false) {

async function renameNode(project, path) {
  const oldPath = normalizePath(path);

  const newName = await showInputDialog({
    title: "Rename",
    message: "Enter the new name or path.",
    placeholder: oldPath,
    value: baseName(oldPath)
  });

  if (!newName) return;

  const target = joinPath(parentPath(oldPath), newName);

  if (project.files[oldPath] !== undefined) {
    const finalTarget = uniquePath(project, target);
    const content = project.files[oldPath];
    delete project.files[oldPath];
    project.files[finalTarget] = content;

    if (project.currentFile === oldPath) project.currentFile = finalTarget;
    if (project.activePreviewFiles.html === oldPath) project.activePreviewFiles.html = finalTarget;
    if (project.activePreviewFiles.css === oldPath) project.activePreviewFiles.css = finalTarget;
    if (project.activePreviewFiles.js === oldPath) project.activePreviewFiles.js = finalTarget;
  } else if (project.folders.includes(oldPath)) {
    const finalTarget = normalizePath(target);
    const oldPrefix = `${oldPath}/`;
    const newPrefix = `${finalTarget}/`;

    project.folders = project.folders.map(f => {
      if (f === oldPath) return finalTarget;
      if (f.startsWith(oldPrefix)) return `${newPrefix}${f.slice(oldPrefix.length)}`;
      return f;
    });

    const moved = {};
    for (const [k, v] of Object.entries(project.files)) {
      if (k === oldPath) moved[finalTarget] = v;
      else if (k.startsWith(oldPrefix)) moved[`${newPrefix}${k.slice(oldPrefix.length)}`] = v;
      else moved[k] = v;
    }
    project.files = moved;

    project.expandedFolders = project.expandedFolders.map(f => {
      if (f === oldPath) return finalTarget;
      if (f.startsWith(oldPrefix)) return `${newPrefix}${f.slice(oldPrefix.length)}`;
      return f;
    });

    if (project.currentFile === oldPath || project.currentFile.startsWith(oldPrefix)) {
      project.currentFile = `${newPrefix}${project.currentFile.slice(oldPrefix.length)}`;
    }

    if (project.activePreviewFiles.html === oldPath || project.activePreviewFiles.html.startsWith(oldPrefix)) {
      project.activePreviewFiles.html = `${newPrefix}${project.activePreviewFiles.html.slice(oldPrefix.length)}`;
    }
    if (project.activePreviewFiles.css === oldPath || project.activePreviewFiles.css.startsWith(oldPrefix)) {
      project.activePreviewFiles.css = `${newPrefix}${project.activePreviewFiles.css.slice(oldPrefix.length)}`;
    }
    if (project.activePreviewFiles.js === oldPath || project.activePreviewFiles.js.startsWith(oldPrefix)) {
      project.activePreviewFiles.js = `${newPrefix}${project.activePreviewFiles.js.slice(oldPrefix.length)}`;
    }

    if (oldPath === project.root) {
      project.root = finalTarget;
      project.name = finalTarget;
    }
  }

  saveAppState();
  renderAll();
  openCurrentFile();
}

async function deleteNode(project, path) {
  const sure = await showConfirmDialog({
    title: "Delete",
    message: `Are you sure you want to delete "${path}"?`,
    okText: "Delete",
    danger: true
  });

  if (!sure) return;

  if (path === project.root) {
    if (appState.projects.length > 1) {
      appState.projects = appState.projects.filter(p => p.id !== project.id);
      appState.activeProjectId = appState.projects[0].id;
      saveAppState();
      openCurrentFile();
      return;
    }

    const reset = createDefaultProject(project.root);
    project.id = reset.id;
    project.name = reset.name;
    project.root = reset.root;
    project.folders = reset.folders;
    project.files = reset.files;
    project.currentFile = reset.currentFile;
    project.expandedFolders = reset.expandedFolders;
    project.activePreviewFiles = reset.activePreviewFiles;
  } else if (project.folders.includes(path)) {
    const prefix = `${path}/`;
    for (const k of Object.keys(project.files)) {
      if (k === path || k.startsWith(prefix)) delete project.files[k];
    }
    project.folders = project.folders.filter(f => f !== path && !f.startsWith(prefix));
    project.expandedFolders = project.expandedFolders.filter(f => f !== path && !f.startsWith(prefix));

    if (project.currentFile === path || project.currentFile.startsWith(prefix)) {
      project.currentFile = `${project.root}/index.html`;
    }
    if (project.activePreviewFiles.html === path || project.activePreviewFiles.html.startsWith(prefix)) {
      project.activePreviewFiles.html = `${project.root}/index.html`;
    }
    if (project.activePreviewFiles.css === path || project.activePreviewFiles.css.startsWith(prefix)) {
      project.activePreviewFiles.css = `${project.root}/style.css`;
    }
    if (project.activePreviewFiles.js === path || project.activePreviewFiles.js.startsWith(prefix)) {
      project.activePreviewFiles.js = `${project.root}/app.js`;
    }
  } else {
    delete project.files[path];
    if (project.currentFile === path) project.currentFile = `${project.root}/index.html`;
    if (project.activePreviewFiles.html === path) project.activePreviewFiles.html = `${project.root}/index.html`;
    if (project.activePreviewFiles.css === path) project.activePreviewFiles.css = `${project.root}/style.css`;
    if (project.activePreviewFiles.js === path) project.activePreviewFiles.js = `${project.root}/app.js`;
  }

  saveAppState();
  renderAll();
  openCurrentFile();
}

async function importFilesTo(project, folderPath) {
  ensureFolderInProject(project, folderPath);
  saveAppState();

  const files = await showFilePicker();
  if (!files.length) return;

  for (const file of files) {
    const safeName = file.name.replace(/\s+/g, "_");
    const path = uniquePath(project, joinPath(folderPath, safeName));
    const content = await readFileSmart(file);
    project.files[path] = content;

    let dir = parentPath(path);
    while (dir) {
      if (!project.folders.includes(dir)) project.folders.push(dir);
      dir = parentPath(dir);
    }
  }

  saveAppState();
  renderAll();
  refreshPreview();
}

function readFileSmart(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);

    const textLike =
      file.type.startsWith("text/") ||
      file.type === "application/json" ||
      /\.(txt|md|html?|css|js|json|xml|svg|csv|ts|tsx|jsx|scss|sass|less)$/i.test(file.name);

    if (file.type.startsWith("image/")) {
      reader.readAsDataURL(file);
    } else if (textLike) {
      reader.readAsText(file);
    } else {
      reader.readAsDataURL(file);
    }
  });
}

function resolveProjectPath(baseFilePath, relativePath) {
  const baseDir = parentPath(baseFilePath) || activeProject().root;
  const combined = `${baseDir}/${relativePath}`;
  const parts = [];

  for (const part of combined.split("/")) {
    if (!part || part === ".") continue;
    if (part === "..") {
      if (parts.length) parts.pop();
      continue;
    }
    parts.push(part);
  }

  return parts.join("/");
}

      project.files[path] = content;

function readFileSmart(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);

    const textLike =
      file.type.startsWith("text/") ||
      file.type === "application/json" ||
      /\.(txt|md|html?|css|js|json|xml|svg|csv|ts|tsx|jsx|scss|sass|less)$/i.test(file.name);

    if (file.type.startsWith("image/")) {
      reader.readAsDataURL(file);
    } else if (textLike) {
      reader.readAsText(file);
    } else {
      reader.readAsDataURL(file);
    }
  });
}

function refreshPreview() {
  const project = activeProject();
  const htmlPath = project.activePreviewFiles?.html || `${project.root}/index.html`;
  const cssPath = project.activePreviewFiles?.css || `${project.root}/style.css`;
  const jsPath = project.activePreviewFiles?.js || `${project.root}/app.js`;

  const htmlCode = project.files[htmlPath] || "";
  const cssCode = project.files[cssPath] || "";
  const jsCode = project.files[jsPath] || "";

  let processedHTML = htmlCode;

  try {
    const doc = new DOMParser().parseFromString(`<div id="root">${htmlCode}</div>`, "text/html");
    const root = doc.getElementById("root");
    if (root) {
      root.querySelectorAll("img").forEach((el) => {
        const src = el.getAttribute("src");
        if (!src) return;
        const resolved = resolveProjectPath(htmlPath, src);
        if (project.files[resolved] !== undefined) {
          el.setAttribute("src", project.files[resolved]);
        } else if (project.files[normalizePath(src)] !== undefined) {
          el.setAttribute("src", project.files[normalizePath(src)]);
        }
      });
      processedHTML = root.innerHTML;
    }
  } catch {}

  preview.srcdoc = `<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>${cssCode}</style>
</head>
<body>
${processedHTML}
<script>
try {
${jsCode}
} catch (e) {
  document.body.insertAdjacentHTML("beforeend", "<pre style='color:red;white-space:pre-wrap;padding:12px;'>" + e + "</pre>");
}
<\/script>
</body>
</html>`;
}

function resolveProjectPath(baseFilePath, relativePath) {
  const baseDir = parentPath(baseFilePath) || activeProject().root;
  const combined = `${baseDir}/${relativePath}`;
  const parts = [];

  for (const part of combined.split("/")) {
    if (!part || part === ".") continue;
    if (part === "..") {
      if (parts.length) parts.pop();
      continue;
    }
    parts.push(part);
  }

  return parts.join("/");
}

function openDialogShell() {

function showInputDialog({ title, message, placeholder = "", value = "", okText = "OK" }) {
  return new Promise((resolve) => {
    openDialogShell();

    const card = document.createElement("div");
    card.className = "dialog-card";

    const h = document.createElement("div");
    h.className = "dialog-title";
    h.textContent = title;

    const p = document.createElement("div");
    p.className = "dialog-message";
    p.textContent = message;

    const input = document.createElement("input");
    input.className = "dialog-input";
    input.type = "text";
    input.placeholder = placeholder;
    input.value = value;

    const actions = document.createElement("div");
    actions.className = "dialog-actions";

    const cancel = document.createElement("button");
    cancel.className = "dialog-btn secondary";
    cancel.type = "button";
    cancel.textContent = "Cancel";

    const ok = document.createElement("button");
    ok.className = "dialog-btn primary";
    ok.type = "button";
    ok.textContent = okText;

    const finish = (result) => {
      closeDialog();
      resolve(result);
    };

    cancel.addEventListener("click", () => finish(null));
    ok.addEventListener("click", () => {
      const val = input.value.trim();
      finish(val || null);
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") ok.click();
      if (e.key === "Escape") cancel.click();
    });

    actions.appendChild(cancel);
    actions.appendChild(ok);
    card.appendChild(h);
    card.appendChild(p);
    card.appendChild(input);
    card.appendChild(actions);
    dialogRoot.appendChild(card);

    setTimeout(() => input.focus(), 0);
  });
}

function showConfirmDialog({ title, message, okText = "OK", danger = false }) {
  return new Promise((resolve) => {
    openDialogShell();

    const card = document.createElement("div");
    card.className = "dialog-card";

    const h = document.createElement("div");
    h.className = "dialog-title";
    h.textContent = title;

    const p = document.createElement("div");
    p.className = "dialog-message";
    p.textContent = message;

    const actions = document.createElement("div");
    actions.className = "dialog-actions";

    const cancel = document.createElement("button");
    cancel.className = "dialog-btn secondary";
    cancel.type = "button";
    cancel.textContent = "Cancel";

    const ok = document.createElement("button");
    ok.className = `dialog-btn ${danger ? "danger" : "primary"}`;
    ok.type = "button";
    ok.textContent = okText;

    const finish = (result) => {
      closeDialog();
      resolve(result);
    };

    cancel.addEventListener("click", () => finish(false));
    ok.addEventListener("click", () => finish(true));

    actions.appendChild(cancel);
    actions.appendChild(ok);
    card.appendChild(h);
    card.appendChild(p);
    card.appendChild(actions);
    dialogRoot.appendChild(card);
  });
}

    if (project.activePreviewFiles.html === oldPath || project.activePreviewFiles.html.startsWith(oldPrefix)) {

      project.activePreviewFiles.js = `${newPrefix}${project.activePreviewFiles.js.slice(oldPrefix.length)}`;

    if (oldPath === project.root) {
